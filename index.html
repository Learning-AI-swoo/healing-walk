<!DOCTYPE html>
<html lang="ko" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>힐링 산책 — Healing Walk</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #0a0a0a; color: #e8e0d0; }

  /* ─── Container ─── */
  #app {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    transition: background 2s ease;
  }

  /* ─── Scene Image ─── */
  #scene-image {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 70%;
    background-size: cover;
    background-position: center;
    z-index: 0;
    opacity: 0;
    transition: opacity 1.5s ease, background-image 1.5s ease;
  }
  #scene-image.visible { opacity: 1; }
  #scene-image::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 50%;
    background: linear-gradient(to bottom, transparent, var(--bg-bottom, #1a3a1a));
    pointer-events: none;
  }

  /* ─── Canvas (particles) ─── */
  #particle-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* ─── Content Layer ─── */
  #content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* ─── Indicators ─── */
  #turn-indicator {
    position: absolute; top: 16px; left: 16px;
    color: rgba(232,224,208,0.3); font-size: 12px; z-index: 3;
  }
  #amb-indicator {
    position: absolute; top: 16px; right: 16px;
    color: rgba(232,224,208,0.4); font-size: 12px; z-index: 3;
    letter-spacing: 1px;
  }

  /* ─── Language Toggle ─── */
  #lang-toggle {
    display: flex;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
    margin-bottom: 24px;
    width: fit-content;
  }
  .lang-btn {
    padding: 6px 16px;
    background: transparent;
    color: rgba(232,224,208,0.35);
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  .lang-btn.active {
    background: rgba(255,255,255,0.12);
    color: #e8e0d0;
  }

  /* ─── Title Screen ─── */
  #title-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; padding: 20px; text-align: center;
  }
  #title-screen h1 {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 300; letter-spacing: 4px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    margin-bottom: 8px;
  }
  #title-screen .subtitle {
    font-size: clamp(14px, 3vw, 20px);
    color: rgba(232,224,208,0.6);
    font-weight: 300; letter-spacing: 8px;
    margin-bottom: 40px;
  }
  .api-section {
    display: flex; flex-direction: column;
    gap: 12px; margin-bottom: 30px;
    width: min(320px, 80vw);
  }
  .provider-toggle {
    display: flex; border-radius: 8px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .provider-btn {
    flex: 1; padding: 8px 12px;
    background: transparent; color: rgba(232,224,208,0.4);
    border: none; cursor: pointer; font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.3s;
  }
  .provider-btn.active {
    background: rgba(255,255,255,0.15);
    color: #e8e0d0;
  }
  #api-key-input {
    padding: 12px 16px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.3); color: #e8e0d0;
    font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
    outline: none; text-align: center;
  }
  .hint { color: rgba(232,224,208,0.35); font-size: 12px; margin-top: 4px; }
  #start-btn {
    padding: 14px 48px; border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08); color: #e8e0d0;
    font-size: 16px; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; letter-spacing: 4px;
    transition: all 0.3s;
  }
  #start-btn:hover { background: rgba(255,255,255,0.15); }

  /* ─── Walk Screen ─── */
  #walk-screen { display: none; height: 100%; flex-direction: column; justify-content: flex-end; }
  #walk-screen.active { display: flex; }

  /* Floating text panel at bottom */
  #text-panel {
    position: relative;
    max-height: 58%;
    display: flex;
    flex-direction: column;
    z-index: 2;
  }

  /* History toggle button */
  #history-toggle {
    display: none;
    align-self: flex-start;
    margin: 0 20px 8px;
    padding: 6px 14px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(0,0,0,0.5);
    color: rgba(232,224,208,0.6);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  #history-toggle:hover { background: rgba(0,0,0,0.65); color: #e8e0d0; }
  #history-toggle.has-history { display: inline-flex; }

  /* History panel (collapsible) */
  #history-panel {
    display: none;
    max-height: 25vh;
    overflow-y: auto;
    margin: 0 16px 8px;
    padding: 12px 16px;
    border-radius: 12px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.06);
  }
  #history-panel.open { display: block; animation: fadeIn 0.3s ease; }
  #history-panel::-webkit-scrollbar { width: 3px; }
  #history-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .history-entry { margin-bottom: 10px; opacity: 0.6; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .history-entry:last-child { margin-bottom: 0; border-bottom: none; }
  .history-narration { color: rgba(232,224,208,0.55); font-size: 12px; line-height: 1.6; margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .history-choice { color: var(--accent, #6aaa7a); font-size: 11px; opacity: 0.6; padding-left: 8px; border-left: 2px solid rgba(106,170,122,0.2); }

  /* Current narration card */
  #narration-card {
    margin: 0 16px 8px;
    padding: 16px 20px;
    border-radius: 14px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.06);
  }

  #narration {
    color: #e8e0d0;
    font-size: clamp(14px, 3.2vw, 17px);
    line-height: 1.85;
    white-space: pre-wrap;
    max-height: 22vh;
    overflow-y: auto;
  }
  #narration::-webkit-scrollbar { width: 3px; }
  #narration::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  #loading {
    color: rgba(232,224,208,0.5);
    font-size: 16px; text-align: center;
    padding: 40px; letter-spacing: 4px;
    animation: pulse 2s infinite;
  }
  .error-box {
    color: #ff8888; font-size: 13px; text-align: center;
    padding: 12px; background: rgba(255,0,0,0.1);
    border-radius: 8px; margin: 12px 0;
  }

  /* ─── Choices ─── */
  #choices-area {
    display: none; flex-direction: column;
    gap: 6px; padding: 0 16px 20px;
    flex-shrink: 0;
    animation: fadeIn 0.5s ease;
  }
  #choices-area.active { display: flex; }
  .choice-btn {
    padding: 11px 16px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #e8e0d0; font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; text-align: left;
    transition: all 0.3s; line-height: 1.5;
  }
  .choice-btn:hover { transform: translateX(4px); }

  /* ─── Surprise Overlay ─── */
  #surprise-overlay {
    display: none;
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7);
    z-index: 100; animation: fadeIn 0.5s ease;
  }
  #surprise-overlay.active { display: flex; }
  #surprise-emoji { font-size: 72px; margin-bottom: 20px; }
  #surprise-text { color: #e8e0d0; font-size: 18px; text-align: center; max-width: 300px; line-height: 1.8; }

  /* ─── Diary Screen ─── */
  #diary-screen {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; padding: 30px; text-align: center;
  }
  #diary-screen.active { display: flex; }
  .diary-card {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 32px 28px;
    max-width: 400px; width: 100%;
  }
  .diary-title {
    font-size: 14px; color: rgba(232,224,208,0.5);
    letter-spacing: 6px; margin-bottom: 24px;
  }
  .diary-line { color: #e8e0d0; font-size: 16px; line-height: 2.2; margin-bottom: 8px; }
  #restart-btn {
    margin-top: 32px; padding: 12px 36px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #e8e0d0; font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; letter-spacing: 3px;
  }
  #restart-btn:hover { background: rgba(255,255,255,0.12); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

  /* mobile safe area */
  @supports (padding: env(safe-area-inset-bottom)) {
    #choices-area { padding-bottom: calc(30px + env(safe-area-inset-bottom)); }
  }

  /* ─── Sound Toggle ─── */
  #sound-toggle {
    position: absolute;
    top: 14px;
    right: 50%;
    transform: translateX(50%);
    z-index: 10;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 6px 14px;
    color: rgba(232,224,208,0.6);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s;
    display: none;
  }
  #sound-toggle:hover { background: rgba(0,0,0,0.6); color: #e8e0d0; }
  #sound-toggle.visible { display: block; }

  /* ─── Text Toggle ─── */
  #text-toggle {
    position: absolute;
    top: 14px;
    left: 16px;
    z-index: 10;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 6px 14px;
    color: rgba(232,224,208,0.6);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s;
    display: none;
  }
  #text-toggle:hover { background: rgba(0,0,0,0.6); color: #e8e0d0; }
  #text-toggle.visible { display: block; }

  /* ─── Wander Button ─── */
  #wander-btn {
    display: none;
    position: absolute;
    bottom: 16px;
    right: 16px;
    z-index: 10;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 7px 14px;
    color: rgba(232,224,208,0.5);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.3s;
  }
  #wander-btn:hover { background: rgba(0,0,0,0.65); color: #e8e0d0; }

  /* ─── Wander Overlay ─── */
  #wander-overlay {
    display: none;
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 90;
    animation: fadeIn 0.3s ease;
  }
  #wander-overlay.active { display: flex; }
  #wander-overlay .wander-title {
    color: rgba(232,224,208,0.5);
    font-size: 13px;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .wander-option {
    padding: 12px 28px;
    min-width: 180px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    color: #e8e0d0;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }
  .wander-option:hover { background: rgba(255,255,255,0.14); transform: scale(1.03); }
  #wander-cancel {
    margin-top: 8px;
    padding: 8px 20px;
    border-radius: 16px;
    border: none;
    background: transparent;
    color: rgba(232,224,208,0.35);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }
  #wander-cancel:hover { color: rgba(232,224,208,0.6); }
</style>
</head>
<body>

<div id="app">
  <div id="scene-image"></div>
  <canvas id="particle-canvas"></canvas>

  <div id="turn-indicator"></div>
  <div id="amb-indicator"></div>
  <button id="sound-toggle" title="사운드 켜기/끄기">🔊</button>
  <button id="text-toggle">📖</button>
  <button id="wander-btn">🧭 다른 길로</button>

  <!-- Wander Overlay -->
  <div id="wander-overlay">
    <div class="wander-title">어 디 로  갈 까 요</div>
    <div id="wander-options"></div>
    <button id="wander-cancel">돌아가기</button>
  </div>

  <div id="content">
    <!-- Title Screen -->
    <div id="title-screen">
      <div id="lang-toggle">
        <button class="lang-btn active" data-lang="ko">한국어</button>
        <button class="lang-btn" data-lang="en">English</button>
      </div>
      <h1 id="title-text">힐링 산책</h1>
      <div class="subtitle" id="subtitle-text">HEALING WALK</div>
      <div class="api-section">
        <div class="provider-toggle">
          <button class="provider-btn active" data-provider="openai">OpenAI</button>
          <button class="provider-btn" data-provider="anthropic">Anthropic</button>
        </div>
        <input type="password" id="api-key-input" placeholder="OpenAI API Key">
        <div class="hint" id="api-hint"></div>
      </div>
      <button id="start-btn">산 책 시 작</button>
    </div>

    <!-- Walk Screen -->
    <div id="walk-screen">
      <div id="text-panel">
        <button id="history-toggle">▲ 이전 이야기</button>
        <div id="history-panel">
          <div id="history"></div>
        </div>
        <div id="narration-card">
          <div id="loading" style="display:none;">걸 어 가 는 중 . . .</div>
          <div id="narration"></div>
          <div id="error" class="error-box" style="display:none;"></div>
        </div>
        <div id="choices-area"></div>
      </div>
    </div>

    <!-- Diary Screen -->
    <div id="diary-screen">
      <div class="diary-card">
        <div class="diary-title">산 책 일 기</div>
        <div id="diary-lines"></div>
      </div>
      <button id="restart-btn">다시 걷기</button>
    </div>
  </div>

  <!-- Surprise Overlay -->
  <div id="surprise-overlay">
    <div id="surprise-emoji"></div>
    <div id="surprise-text"></div>
  </div>
</div>

<script>
// ─── Sound System ───
const SOUNDS = {};
let currentSound = null;
let soundMuted = false;
const soundToggle = document.getElementById('sound-toggle');
const textToggle = document.getElementById('text-toggle');
let textHidden = false;

function initSounds() {
  const soundFiles = {
    forest: './sounds/forest.mp3',
    rain: './sounds/rain.mp3',
    night: './sounds/night.mp3',
    snow: './sounds/snow.mp3',
    beach: './sounds/beach.mp3',
  };
  for (const [id, src] of Object.entries(soundFiles)) {
    SOUNDS[id] = new Howl({
      src: [src],
      loop: true,
      volume: 0,
      preload: true,
    });
  }
}

function fadeToSound(ambienceId) {
  const target = SOUNDS[ambienceId];
  if (!target) return;
  // 타이틀/다이어리 화면에서는 사운드 재생 안 함
  if (!soundToggle.classList.contains('visible')) return;
  // 같은 사운드면 무시
  if (currentSound === target && target.playing()) return;

  // 현재 재생 중인 사운드를 페이드아웃
  if (currentSound && currentSound !== target) {
    const old = currentSound;
    old.fade(soundMuted ? 0 : 0.4, 0, 2000);
    setTimeout(() => { if (!old.playing() || old === currentSound) return; old.stop(); }, 2100);
  }

  // 새 사운드 페이드인
  target.volume(0);
  if (!target.playing()) target.play();
  target.fade(0, soundMuted ? 0 : 0.4, 2000);
  currentSound = target;
}

function toggleSound() {
  soundMuted = !soundMuted;
  soundToggle.textContent = soundMuted ? '🔇' : '🔊';
  if (currentSound) {
    if (soundMuted) {
      currentSound.fade(currentSound.volume(), 0, 300);
    } else {
      currentSound.fade(0, 0.4, 300);
    }
  }
}

function stopAllSounds() {
  for (const s of Object.values(SOUNDS)) {
    s.stop();
  }
  currentSound = null;
}

// ─── Config ───
const AMBIENCES = {
  forest: { name: '숲길 🌿', bg: 'linear-gradient(180deg, #1a3a1a 0%, #2d5a2d 30%, #3a6b3a 60%, #2a4a2a 100%)', bgBottom: '#2a4a2a', particle: 'leaf', accent: '#6aaa7a', textBg: 'rgba(20,40,20,0.85)' },
  rain:   { name: '빗속 🌧️', bg: 'linear-gradient(180deg, #2a3a4a 0%, #3a4a5a 30%, #4a5a6a 60%, #2a3a4a 100%)', bgBottom: '#2a3a4a', particle: 'rain', accent: '#6a9aba', textBg: 'rgba(20,30,45,0.85)' },
  night:  { name: '밤길 ✨', bg: 'linear-gradient(180deg, #0a0a2a 0%, #1a1a3a 30%, #2a2050 60%, #0a0a1a 100%)', bgBottom: '#0a0a1a', particle: 'firefly', accent: '#b0a0d0', textBg: 'rgba(10,10,30,0.85)' },
  snow:   { name: '설경 ❄️', bg: 'linear-gradient(180deg, #4a5a6a 0%, #6a7a8a 30%, #8a9aaa 60%, #5a6a7a 100%)', bgBottom: '#5a6a7a', particle: 'snow', accent: '#a0bcd0', textBg: 'rgba(40,50,60,0.85)' },
  beach:  { name: '해변 🌅', bg: 'linear-gradient(180deg, #d4886a 0%, #e8a070 30%, #c08060 60%, #8a6050 100%)', bgBottom: '#8a6050', particle: 'none', accent: '#d4a06a', textBg: 'rgba(60,40,30,0.85)' },
};

const IMAGE_MAP = {
  forest_path: './images/forest_path.jpeg', forest_stream: './images/forest_stream.jpeg',
  forest_bench: './images/forest_bench.jpeg', forest_cabin: './images/forest_cabin.jpeg',
  forest_bridge: './images/forest_bridge.jpeg',
  rain_path: './images/rain_path.jpeg', rain_shelter: './images/rain_shelter.jpeg',
  rain_puddle: './images/rain_puddle.jpeg', rain_umbrella: './images/rain_umbrella.jpeg',
  night_moon: './images/night_moon.jpeg', night_fireflies: './images/night_fireflies.jpeg',
  night_stars: './images/night_stars.jpeg', night_campfire: './images/night_campfire.jpeg',
  snow_path: './images/snow_path.jpeg', snow_lake: './images/snow_lake.jpeg',
  snow_village: './images/snow_village.jpeg', snow_field: './images/snow_field.jpeg',
  beach_sunset: './images/beach_sunset.jpeg', beach_lighthouse: './images/beach_lighthouse.jpeg',
  beach_tide: './images/beach_tide.jpeg', beach_dock: './images/beach_dock.jpeg',
};

// Default scene per ambience (fallback)
const DEFAULT_SCENE = {
  forest: 'forest_path', rain: 'rain_path', night: 'night_moon',
  snow: 'snow_path', beach: 'beach_sunset',
};

const SYSTEM_PROMPT = `당신은 '힐링 산책' 텍스트 어드벤처의 내레이터입니다.

## 역할과 문체
당신은 산책길의 조용한 동반자입니다. ASMR처럼 낮고 따뜻한 톤으로, 독자가 실제로 그 자리에 서 있는 듯한 감각을 전달하세요.

### 문장 스타일
- 짧은 문장과 긴 문장을 교차하세요. 리듬이 단조로워지지 않게.
- 매 턴마다 다른 감각을 리드로 시작하세요 (이번 턴이 소리로 시작했으면, 다음은 촉감이나 냄새로).
- 한 턴에 2~3가지 감각을 자연스럽게 섞되, 나열하지 말고 장면 안에 녹이세요.
- 피해야 할 것: "아름다운", "신비로운", "평화로운" 같은 추상적 형용사 반복. 대신 구체적 디테일로 보여주세요.

좋은 예:
"발밑에서 낙엽이 바스락거린다. 참나무 잎 특유의 마른 냄새가 올라오고, 저 멀리 개울물이 돌 사이를 빠져나가는 소리가 희미하게 들린다. 햇살이 나뭇잎 사이로 비스듬히 내려와 흙길 위에 동전 크기의 빛 조각들을 흩뿌린다."

피할 예:
"아름다운 숲길을 걷습니다. 평화로운 자연의 소리가 들리고, 신비로운 빛이 나무 사이로 비칩니다. 마음이 편안해집니다."

## 서사 연결성 (중요)
각 턴은 독립된 장면이 아닙니다. 반드시 이전 턴과 연결하세요:
- 사용자의 이전 선택을 첫 1~2문장에서 자연스럽게 반영하세요 (선택의 결과로 지금 이 장면에 도착한 느낌).
- 시간의 흐름을 암시하세요 (해가 조금 기울었다, 바람이 방향을 바꿨다, 발걸음이 가벼워졌다 등).
- 산책자의 내면 상태가 조금씩 변화하는 것을 보여주세요 (긴장 → 이완, 호기심 → 몰입 등).

## 선택지 설계 (중요)
선택지 3개는 서로 다른 종류의 행동이어야 합니다:
- **감각/관찰형**: 멈춰서 무언가를 자세히 보거나 듣는 선택 (예: "이끼 낀 바위에 손을 대본다")
- **이동/탐험형**: 새로운 방향이나 장소로 발걸음을 옮기는 선택 (예: "오솔길을 따라 더 깊이 들어간다")
- **정서/행동형**: 감정적 반응이나 작은 행동 (예: "눈을 감고 깊이 숨을 들이쉰다", "주머니에서 손을 꺼내 빗방울을 받아본다")

매번 이 세 유형을 기계적으로 따를 필요는 없지만, "장소 A로 간다 / 장소 B로 간다 / 장소 C로 간다" 식으로 단순 이동만 나열되지 않게 하세요. 선택에 따라 다음 턴의 분위기와 전개가 달라져야 합니다.

이동/탐험형 선택지를 고르면 반드시 SCENE id가 바뀌어야 합니다. 같은 씬에 머무르지 마세요.

## 앰비언스 전환
한 플레이에서 2~3개의 앰비언스를 경험하게 하세요. 5개를 전부 보여주려 하지 마세요.

### 전환 타이밍
- 하나의 앰비언스에서 2~3턴 머문 뒤 전환하세요.
- 전환 직전 턴의 나레이션에서 반드시 징조를 보여주세요 (먹구름, 해질녘 빛, 파도 소리 등).
- 선택지 중 하나는 반드시 다른 앰비언스로 이어지는 옵션이어야 하고, 그 선택지를 고르면 실제로 AMBIENCE와 SCENE이 바뀌어야 합니다.

### 자연스러운 전환 경로
아래 경로를 참고하세요. 이 중에서 2~3개를 골라 진행하세요:
- forest → rain (숲에서 비가 내리기 시작)
- forest → night (숲에서 해가 저물어 밤이 됨)
- forest → beach (숲길을 따라가니 해변이 나옴)
- rain → night (비가 그치고 밤하늘이 드러남)
- rain → snow (비가 눈으로 바뀜)
- night → snow (밤에 눈이 내리기 시작)
- beach → night (해변에서 해가 지고 밤이 됨)
- snow → night (눈 덮인 밤 풍경)

### 같은 앰비언스 안에서의 씬 이동
하나의 앰비언스 안에서도 턴마다 다른 SCENE을 보여주세요:
- forest: path → stream → bench → cabin → bridge 순서로 깊이 들어가는 느낌
- rain: path → umbrella → puddle → shelter 순서로 비를 맞다가 쉬는 흐름
- night: moon → fireflies → stars → campfire 순서로 밤이 깊어지는 느낌
- snow: path → lake → field → village 순서로 설경을 탐험
- beach: sunset → tide → lighthouse → dock 순서로 해변을 따라 걷는 느낌
이 순서를 반드시 따를 필요는 없지만, 같은 SCENE id를 연속으로 사용하지 마세요.

## 중요한 제약 (반드시 지킬 것)
- 이 게임은 **자연 속 산책**입니다. 카페, 도시, 사람과의 대화, 실내 활동 등은 절대 포함하지 마세요.
- 장면은 반드시 아래 scene id 목록에 있는 장소만 사용하세요. 목록에 없는 장소를 만들지 마세요.

## 응답 형식
1. 맨 앞에 [AMBIENCE:id] 태그 (필수)
2. 바로 뒤에 [SCENE:id] 태그 (필수)
3. 2~3문단의 나레이션 (감각적 묘사)
4. 반드시 선택지 **정확히 3개** (A, B, C만 사용. D 이상은 절대 만들지 마세요):
**A)** 선택지 텍스트
**B)** 선택지 텍스트
**C)** 선택지 텍스트

⚠ 중요: 선택지는 나레이션 텍스트와 분리하세요. 나레이션 문단 안에 **A)**, **B)**, **C)** 등을 삽입하지 마세요. 나레이션이 끝난 뒤 별도 줄에 선택지를 작성하세요.

## 앰비언스 & 씬 태그
가능한 AMBIENCE id: forest, rain, night, snow, beach

가능한 SCENE id (이 목록에서만 선택):

## 서프라이즈 이벤트
3~4턴마다 [SURPRISE:이모지:짧은설명] 태그를 나레이션 뒤에 추가하세요.
서프라이즈는 자연 속 우연한 순간이어야 합니다 (동물과의 조우, 날씨 변화, 하늘의 현상 등).

---DIARY---

---END---`;

const SYSTEM_PROMPT_EN = `You are the narrator of 'Healing Walk', a text adventure set in nature.

## Role & Voice
You are a quiet companion on the trail. Your tone is low, warm, and intimate — like ASMR for reading. Make the reader feel they are standing in the scene.

### Writing Style
- Vary sentence length. Short and long, alternating. Keep rhythm alive.
- Lead each turn with a different sense (if the last opened with sound, start this one with touch or smell).
- Weave 2–3 senses naturally into each scene. Don't list them — let them dissolve into the moment.
- Avoid vague adjectives: "beautiful," "mysterious," "peaceful." Instead, show through detail.

Good example:
"Dry leaves crack underfoot. The sharp scent of oak rises from the ground, and somewhere ahead, water slips between stones — a thin, rushing murmur. Sunlight angles through the canopy and scatters coin-sized patches of light across the dirt."

Avoid:
"You walk through a beautiful forest. Peaceful sounds of nature surround you. Mysterious light filters through the trees. You feel calm."

## Narrative Continuity (Important)
Each turn is not a standalone scene. Always connect to the previous turn:
- Reflect the player's last choice in your opening 1–2 sentences (they arrived here because of that choice).
- Hint at passing time (the sun has shifted, the wind changed direction, your steps feel lighter).
- Show gradual inner change in the walker (tension → ease, curiosity → absorption).

## Choice Design (Important)
The 3 choices must offer different kinds of action:
- **Sensory/Observation**: Stop and look closely, listen, touch something (e.g., "Press your palm against the mossy bark")
- **Movement/Exploration**: Head in a new direction (e.g., "Follow the trail deeper into the trees")
- **Emotional/Action**: A small gesture or emotional response (e.g., "Close your eyes and breathe in deeply", "Hold out your hand to catch the rain")

Don't mechanically repeat this framework every turn, but never give three choices that are all just "go to Place A / Place B / Place C." Each choice should lead to a different mood and direction.

If the player picks a movement/exploration choice, the SCENE id must change. Don't stay on the same scene.

## Ambience Transitions
Let the player experience 2–3 ambiences per session. Don't try to show all 5.

### Transition Timing
- Stay in one ambience for 2–3 turns before switching.
- In the turn before a transition, foreshadow it (dark clouds gathering, fading light, distant waves).
- One of the three choices should always lead to a different ambience, and selecting it must actually change the AMBIENCE and SCENE.

### Natural Transition Paths
Use these as reference. Pick 2–3 per session:
- forest → rain (rain begins in the forest)
- forest → night (sun sets in the forest)
- forest → beach (the trail opens onto the shore)
- rain → night (rain clears, night sky appears)
- rain → snow (rain turns to snow)
- night → snow (snow begins falling at night)
- beach → night (sunset fades to night on the beach)
- snow → night (snowy night landscape)

### Scene Progression Within an Ambience
Show different scenes each turn within the same ambience:
- forest: path → stream → bench → cabin → bridge (going deeper)
- rain: path → umbrella → puddle → shelter (walking in rain, then resting)
- night: moon → fireflies → stars → campfire (night deepening)
- snow: path → lake → field → village (exploring the snowscape)
- beach: sunset → tide → lighthouse → dock (walking along the shore)
You don't have to follow this order exactly, but never repeat the same SCENE id consecutively.

## Hard Constraints (Must Follow)
- This is a walk through nature. No cafés, cities, conversations with people, or indoor activities.
- Only use scene ids from the list below. Never invent new locations.
- If the turn count is below 7, never offer a "go home" or ending option. Do not generate a ---DIARY--- block.
- Even at turn 7+, do not generate ---DIARY--- unless the player explicitly chooses to go home.

## Response Format
1. Start with [AMBIENCE:id] tag (required)
2. Immediately followed by [SCENE:id] tag (required)
3. 2–3 paragraphs of narration (sensory writing)
4. Exactly 3 choices (A, B, C only. Never create D or beyond):
**A)** Choice text
**B)** Choice text
**C)** Choice text

⚠ Important: Choices must be separated from narration. Do not embed **A)**, **B)**, **C)** inside narration paragraphs. Write them on separate lines after the narration ends.

## Ambience & Scene Tags
Available AMBIENCE ids: forest, rain, night, snow, beach

Available SCENE ids (choose only from this list):
- forest: forest_path, forest_stream, forest_bench, forest_cabin, forest_bridge
- rain: rain_path, rain_shelter, rain_puddle, rain_umbrella
- night: night_moon, night_fireflies, night_stars, night_campfire
- snow: snow_path, snow_lake, snow_village, snow_field
- beach: beach_sunset, beach_lighthouse, beach_tide, beach_dock

## Surprise Events
Every 3–4 turns, add a [SURPRISE:emoji:short description] tag after the narration.
Surprises should be chance encounters in nature (an animal, a weather shift, something in the sky).
Examples: [SURPRISE:🦌:A deer freezes mid-step, watching you], [SURPRISE:🌠:A shooting star streaks across the sky]

## Ending (Turn 7+ Only)
At turn 7 or later, place a "head home" or "end the walk" option in **C)**. Always in C), and never create a D) choice.
Only when the player chooses to go home, write a final narration and then a 3-line journal:

### Turn 22+: Forced Ending
If the turn count is 22 or more, write a narration where the walker naturally heads home and generate a ---DIARY--- block. Do not generate choices.

---DIARY---
Line 1: One image from today's walk (a specific detail)
Line 2: A feeling from the walk (a short sentence, not just one word)
Line 3: A word to tomorrow's self
---END---`;

});

// ─── Apply Ambience ───
function applyAmbience(id) {
  const amb = AMBIENCES[id];
  if (!amb) return;
  state.ambience = id;
  app.style.background = amb.bg;
  document.documentElement.style.setProperty('--bg-bottom', amb.bgBottom);
  document.documentElement.style.setProperty('--accent', amb.accent);
  document.documentElement.style.setProperty('--text-bg', amb.textBg);

  // Update choice button styles
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.style.borderColor = amb.accent + '44';
    btn.style.background = amb.textBg;
  });

  ambInd.textContent = AMBIENCE_LABELS_I18N[state.lang][id];
  initParticles();
  // 사운드 전환
  fadeToSound(id);
}

// ─── Apply Scene Image ───
function applyScene(sceneId) {
  const id = sceneId || DEFAULT_SCENE[state.ambience];
  const url = IMAGE_MAP[id];
  if (url) {
    sceneImg.style.backgroundImage = `url(${url})`;
    sceneImg.classList.add('visible');
  } else {
    sceneImg.classList.remove('visible');
  }
  state.scene = id;
}

// ─── Parse Response ───
function parseResponse(text) {
  console.log('📝 API 응답 원문:', text);
  let ambience = null, scene = null, surprise = null, diary = null, choices = [], narration = text;

  const ambMatch = narration.match(/\[AMBIENCE:(\w+)\]/);
  if (ambMatch) { ambience = ambMatch[1]; narration = narration.replace(ambMatch[0], ''); }

  const sceneMatch = narration.match(/\[SCENE:(\w+)\]/);
  if (sceneMatch) { scene = sceneMatch[1]; narration = narration.replace(sceneMatch[0], ''); }

  const surpMatch = narration.match(/\[SURPRISE:(.+?):(.+?)\]/);
  if (surpMatch) { surprise = { emoji: surpMatch[1], text: surpMatch[2] }; narration = narration.replace(surpMatch[0], ''); }

  const diaryMatch = narration.match(/---DIARY---([\s\S]*?)---END---/);
  if (diaryMatch) { diary = diaryMatch[1].trim().split('\n').map(l => l.trim()).filter(Boolean); narration = narration.replace(diaryMatch[0], ''); }

  const choiceRegex = /(?:\*\*)?([A-D])\)(?:\*\*)?\s*(.+)/g;
  let m;
  while ((m = choiceRegex.exec(narration)) !== null) { choices.push({ label: m[1], text: m[2].trim() }); }
  narration = narration.replace(/(?:\*\*)?[A-D]\)(?:\*\*)?\s*.+/g, '').trim();

  console.log('🎯 파싱 결과:', { ambience, scene, surprise: !!surprise, diary: !!diary, choices: choices.length });
  return { ambience, scene, surprise, diary, choices, narration };
}

// ─── Typing Animation ───
function typeText(el, text, speed = 12) {
  return new Promise(resolve => {
    el.textContent = '';
    let i = 0;
    const interval = setInterval(() => {
      i++;
      el.textContent = text.slice(0, i);
      el.scrollTop = el.scrollHeight;
      if (i >= text.length) { clearInterval(interval); resolve(); }
    }, speed);
  });
}

// ─── Show Surprise ───
function showSurprise(surprise) {
  $('#surprise-emoji').textContent = surprise.emoji;
  $('#surprise-text').textContent = surprise.text;
  surpriseOverlay.classList.add('active');
  setTimeout(() => surpriseOverlay.classList.remove('active'), 3500);
}

// ─── API Call ───
async function callAPI(userMessage) {
  state.messages.push({ role: 'user', content: userMessage });

  try {
    let assistantText = '';
    const sysPrompt = state.lang === 'en' ? SYSTEM_PROMPT_EN : SYSTEM_PROMPT;

    if (state.provider === 'openai') {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.apiKey}`,
        },
        body: JSON.stringify({
          model: 'gpt-4.1',
          max_tokens: 1000,
          messages: [
            { role: 'system', content: sysPrompt },
            ...state.messages,
          ],
        }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      assistantText = data.choices?.[0]?.message?.content || '';
    } else {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': state.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: sysPrompt,
          messages: state.messages,
        }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      assistantText = data.content?.map(c => c.text || '').join('') || '';
    }

    state.messages.push({ role: 'assistant', content: assistantText });
    return parseResponse(assistantText);
  } catch (e) {
    throw e;
  }
}

// ─── Show Choices ───
function showChoices(choices) {
  choicesArea.innerHTML = '';
  const amb = AMBIENCES[state.ambience];

  // 맥스턴 22 이상: 귀가 선택지만 표시
  if (state.turn >= 22) {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    const t = UI_TEXT[state.lang];
    btn.textContent = t.goHome;
    btn.style.borderColor = amb.accent + '30';
    btn.addEventListener('click', () => handleChoice({ label: 'A', text: t.goHomeText }));
    choicesArea.appendChild(btn);
    choicesArea.classList.add('active');
    wanderBtn.style.display = 'none';
    return;
  }

  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = `${c.label}) ${c.text}`;
    btn.style.borderColor = amb.accent + '30';
    btn.addEventListener('mouseenter', () => {
      btn.style.background = amb.accent + '20';
      btn.style.borderColor = amb.accent + '55';
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.background = 'rgba(0,0,0,0.45)';
      btn.style.borderColor = amb.accent + '30';
    });
    btn.addEventListener('click', () => handleChoice(c));
    choicesArea.appendChild(btn);
  });
  choicesArea.classList.add('active');

  // 7턴 이상에서 wander 버튼 표시
  wanderBtn.style.display = (state.turn >= 7) ? 'block' : 'none';
}

// ─── Wander System ───
const wanderBtn = $('#wander-btn');
const wanderOverlay = $('#wander-overlay');
const wanderOptions = $('#wander-options');
const wanderCancel = $('#wander-cancel');

// AMBIENCE_LABELS → moved to AMBIENCE_LABELS_I18N above

wanderBtn.addEventListener('click', () => {
  wanderOptions.innerHTML = '';
  const labels = AMBIENCE_LABELS_I18N[state.lang];
  for (const [id, label] of Object.entries(labels)) {
    if (id === state.ambience) continue;
    const btn = document.createElement('button');
    btn.className = 'wander-option';
    btn.textContent = label;
    btn.addEventListener('click', () => {
      wanderOverlay.classList.remove('active');
      wanderBtn.style.display = 'none';
      handleWander(id);
    });
    wanderOptions.appendChild(btn);
  }
  wanderOverlay.classList.add('active');
});

wanderCancel.addEventListener('click', () => {
  wanderOverlay.classList.remove('active');
});

async function handleWander(targetAmbience) {
  // Unlock audio context on user gesture
  if (Howler.ctx && Howler.ctx.state === 'suspended') {
    Howler.ctx.resume();
  }
  // 히스토리에 기록
  const wanderLabel = state.lang === 'en'
    ? `Another Path → ${AMBIENCE_LABELS_I18N.en[targetAmbience]}`
    : `다른 길로 → ${AMBIENCE_LABELS_I18N.ko[targetAmbience]}`;
  addHistory(narrationEl.textContent, wanderLabel);
  state.history.push({ narration: narrationEl.textContent, choice: `wander: ${targetAmbience}` });

  narrationEl.textContent = '';
  choicesArea.classList.remove('active');
  choicesArea.innerHTML = '';
  loadingEl.style.display = 'block';
  errorEl.style.display = 'none';
  state.turn++;
  turnInd.textContent = `${UI_TEXT[state.lang].turnLabel} ${state.turn}`;

  try {
    const parsed = await callAPI(UI_TEXT[state.lang].wanderInstruction(targetAmbience, state.turn));
    loadingEl.style.display = 'none';

    // 강제로 앰비언스 적용 (AI가 태그를 안 보낼 수 있으므로)
    applyAmbience(targetAmbience);
    applyScene(parsed.scene || DEFAULT_SCENE[targetAmbience]);
    if (parsed.surprise) showSurprise(parsed.surprise);

    if (parsed.diary) {
      showDiary(parsed.narration, parsed.diary);
      return;
    }

    await typeText(narrationEl, parsed.narration);
    if (parsed.choices.length > 0) showChoices(parsed.choices);
  } catch (e) {
    loadingEl.style.display = 'none';
    errorEl.textContent = '⚠ ' + e.message;
    errorEl.style.display = 'block';
  }
}

// ─── Add History Entry ───
function addHistory(narration, choice) {
  const entry = document.createElement('div');
  entry.className = 'history-entry';
  entry.innerHTML = `<div class="history-narration">${narration}</div><div class="history-choice">▸ ${choice}</div>`;
  historyEl.appendChild(entry);
  historyToggle.classList.add('has-history');
  // Close history when new turn starts
  historyOpen = false;
  historyPanel.classList.remove('open');
  historyToggle.textContent = UI_TEXT[state.lang].historyToggleClosed;
}

// ─── Handle Choice ───
async function handleChoice(choice) {
  // Unlock audio context on user gesture
  if (Howler.ctx && Howler.ctx.state === 'suspended') {
    Howler.ctx.resume();
  }
  addHistory(narrationEl.textContent, choice.text);
  state.history.push({ narration: narrationEl.textContent, choice: choice.text });

  narrationEl.textContent = '';
  choicesArea.classList.remove('active');
  choicesArea.innerHTML = '';
  loadingEl.style.display = 'block';
  errorEl.style.display = 'none';
  state.turn++;
  turnInd.textContent = `${UI_TEXT[state.lang].turnLabel} ${state.turn}`;

  try {
    const choiceMsg = state.lang === 'en'
      ? `Choice: ${choice.text}\n\n[Current ambience: ${state.ambience}, Turn: ${state.turn}]`
      : `선택: ${choice.text}\n\n[현재 앰비언스: ${state.ambience}, 턴: ${state.turn}]`;
    const parsed = await callAPI(choiceMsg);
    loadingEl.style.display = 'none';

    if (parsed.ambience && AMBIENCES[parsed.ambience]) applyAmbience(parsed.ambience);
    if (parsed.scene || parsed.ambience) applyScene(parsed.scene);
    if (parsed.surprise) showSurprise(parsed.surprise);

    if (parsed.diary) {
      showDiary(parsed.narration, parsed.diary);
      return;
    }

    await typeText(narrationEl, parsed.narration);
    if (parsed.choices.length > 0) showChoices(parsed.choices);
  } catch (e) {
    loadingEl.style.display = 'none';
    errorEl.textContent = '⚠ ' + e.message;
    errorEl.style.display = 'block';
  }
}

// ─── Show Diary ───
function showDiary(lastNarration, diaryLines) {
  walkScreen.classList.remove('active');
  diaryScreen.classList.add('active');
  const linesEl = $('#diary-lines');
  linesEl.innerHTML = '';
  diaryLines.forEach(line => {
    const div = document.createElement('div');
    div.className = 'diary-line';
    div.textContent = line;
    linesEl.appendChild(div);
  });
}

// ─── Start Walk ───
async function startWalk() {
  if (!state.apiKey) {
    $('#api-hint').textContent = UI_TEXT[state.lang].apiHintEmpty;
    return;
  }

  // Unlock audio context on user gesture (browser autoplay policy)
  if (Howler.ctx && Howler.ctx.state === 'suspended') {
    Howler.ctx.resume();
  }

  titleScreen.style.display = 'none';
  walkScreen.classList.add('active');
  soundToggle.classList.add('visible');
  textToggle.classList.add('visible');
  state.turn = 1;
  state.messages = [];
  state.history = [];
  historyEl.innerHTML = '';
  historyToggle.classList.remove('has-history');
  historyPanel.classList.remove('open');
  historyOpen = false;
  narrationEl.textContent = '';
  turnInd.textContent = `${UI_TEXT[state.lang].turnLabel} 1`;
  loadingEl.style.display = 'block';
  errorEl.style.display = 'none';

  try {
    const parsed = await callAPI(UI_TEXT[state.lang].startMessage);
    loadingEl.style.display = 'none';

    if (parsed.ambience && AMBIENCES[parsed.ambience]) applyAmbience(parsed.ambience);
    applyScene(parsed.scene);
    if (parsed.surprise) showSurprise(parsed.surprise);

    await typeText(narrationEl, parsed.narration);
    if (parsed.choices.length > 0) showChoices(parsed.choices);
  } catch (e) {
    loadingEl.style.display = 'none';
    errorEl.textContent = '⚠ ' + e.message;
    errorEl.style.display = 'block';
  }
}

// ─── Reset ───
function resetGame() {
  diaryScreen.classList.remove('active');
  walkScreen.classList.remove('active');
  titleScreen.style.display = '';
  sceneImg.classList.remove('visible');
  state.ambience = 'forest';
  stopAllSounds();
  soundToggle.classList.remove('visible');
  textToggle.classList.remove('visible');
  textHidden = false;
  wanderBtn.style.display = 'none';
  wanderOverlay.classList.remove('active');
  applyAmbience('forest');
  state.turn = 0;
  state.messages = [];
  state.history = [];
  turnInd.textContent = '';
  ambInd.textContent = '';
  historyToggle.classList.remove('has-history');
  historyPanel.classList.remove('open');
  historyOpen = false;
}

$('#start-btn').addEventListener('click', startWalk);
$('#restart-btn').addEventListener('click', resetGame);
soundToggle.addEventListener('click', toggleSound);

// ─── Text Toggle ───
function toggleText() {
  textHidden = !textHidden;
  const panel = $('#text-panel');
  const wander = $('#wander-btn');
  panel.style.display = textHidden ? 'none' : '';
  if (wander.style.display === 'block') wander.style.display = textHidden ? 'none' : 'block';
  textToggle.textContent = textHidden ? '💬' : '📖';
}
textToggle.addEventListener('click', toggleText);

// 사운드 초기화 (Howl 객체 미리 생성)
initSounds();

// ─── Particle System ───
let particles = [];
let particleAnim = null;
const canvas = $('#particle-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function W() { return canvas.offsetWidth; }
function H() { return canvas.offsetHeight; }

function spawnParticle(type) {
  if (!type || type === 'none') return null;
  switch (type) {
    case 'leaf': return { x: Math.random()*W(), y: -20, vx: Math.random()*0.5-0.25, vy: Math.random()*1+0.5, rot: Math.random()*Math.PI*2, rotV: Math.random()*0.02-0.01, size: Math.random()*6+4, opacity: Math.random()*0.4+0.3, color: ['#8B6914','#6B8E23','#D2691E','#CD853F'][Math.floor(Math.random()*4)] };
    case 'rain': return { x: Math.random()*W(), y: -10, vy: Math.random()*6+8, len: Math.random()*15+10, opacity: Math.random()*0.3+0.1 };
    case 'firefly': return { x: Math.random()*W(), y: Math.random()*H(), vx: Math.random()*0.4-0.2, vy: Math.random()*0.4-0.2, pulse: Math.random()*Math.PI*2, size: Math.random()*3+2 };
    case 'snow': return { x: Math.random()*W(), y: -10, vx: Math.random()*0.5-0.25, vy: Math.random()*1+0.3, wobble: Math.random()*Math.PI*2, size: Math.random()*4+2, opacity: Math.random()*0.5+0.3 };
    default: return null;
  }
}

function drawParticles() {
  ctx.clearRect(0, 0, W(), H());
  const type = AMBIENCES[state.ambience]?.particle;
  if (!type || type === 'none') { particleAnim = requestAnimationFrame(drawParticles); return; }

  if (type === 'firefly' && particles.length < 25) particles.push(spawnParticle(type));
  else if (type !== 'firefly' && Math.random() < 0.3) particles.push(spawnParticle(type));
  if (particles.length > 100) particles = particles.slice(-80);

  particles = particles.filter(p => {
    if (!p) return false;
    switch (type) {
      case 'leaf':
        p.x += p.vx + Math.sin(p.rot)*0.3; p.y += p.vy; p.rot += p.rotV;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.globalAlpha = p.opacity; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.ellipse(0, 0, p.size, p.size*0.5, 0, 0, Math.PI*2); ctx.fill();
        ctx.restore(); return p.y < H()+20;
      case 'rain':
        p.y += p.vy; ctx.globalAlpha = p.opacity; ctx.strokeStyle = '#aaccee'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y+p.len); ctx.stroke();
        return p.y < H()+20;
      case 'firefly':
        p.x += p.vx; p.y += p.vy; p.pulse += 0.03;
        if (p.x < 0 || p.x > W()) p.vx *= -1;
        if (p.y < 0 || p.y > H()) p.vy *= -1;
        const glow = (Math.sin(p.pulse)+1)/2;
        ctx.globalAlpha = glow*0.7; ctx.fillStyle = '#ffffaa';
        ctx.shadowColor = '#ffffaa'; ctx.shadowBlur = 15;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0; return true;
      case 'snow':
        p.wobble += 0.02; p.x += p.vx + Math.sin(p.wobble)*0.5; p.y += p.vy;
        ctx.globalAlpha = p.opacity; ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        return p.y < H()+20;
      default: return false;
    }
  });
  ctx.globalAlpha = 1;
  particleAnim = requestAnimationFrame(drawParticles);
}

function initParticles() {
  particles = [];
  if (particleAnim) cancelAnimationFrame(particleAnim);
  drawParticles();
}

// ─── Init ───
applyAmbience('forest');
</script>
